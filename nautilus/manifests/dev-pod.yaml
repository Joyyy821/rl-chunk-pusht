apiVersion: v1
kind: Pod
metadata:
  name: yjiao-rl-chunk-pusht-dev
  labels:
    app: rl-chunk-pusht
    role: dev
spec:
  restartPolicy: Never
  securityContext:
    runAsUser: 1000
    runAsGroup: 100
    fsGroup: 100
    fsGroupChangePolicy: OnRootMismatch
  initContainers:
    - name: fix-pvc-permissions
      image: docker.io/library/busybox:1.36
      command:
        - sh
        - -c
      args:
        - |
          set -eu
          mkdir -p /workspace/src /workspace/outputs /workspace/cache /workspace/home /workspace/tmp
          owner="$(stat -c '%u:%g' /workspace || true)"
          if [ "${owner}" != "1000:100" ]; then
            chown -R 1000:100 /workspace
          else
            chown -R 1000:100 /workspace/src /workspace/outputs /workspace/cache /workspace/home /workspace/tmp
          fi
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      volumeMounts:
        - name: workspace
          mountPath: /workspace
  containers:
    - name: gpu
      image: gitlab-registry.nrp-nautilus.io/nrp/scientific-images/python:latest
      imagePullPolicy: IfNotPresent
      command:
        - /bin/bash
        - -lc
      args:
        - |
          set -euo pipefail
          mkdir -p "${HOME}" "${XDG_CACHE_HOME}" "${UV_CACHE_DIR}" "${TMPDIR}" /workspace/src /workspace/outputs
          echo "Dev pod is ready. Attach with: kubectl exec -it yjiao-rl-chunk-pusht-dev -- bash"
          sleep infinity
      env:
        - name: HOME
          value: /workspace/home
        - name: XDG_CACHE_HOME
          value: /workspace/cache
        - name: UV_CACHE_DIR
          value: /workspace/cache/uv
        - name: TMPDIR
          value: /workspace/tmp
        - name: MPLCONFIGDIR
          value: /workspace/cache/matplotlib
        - name: WANDB_DIR
          value: /workspace/cache/wandb
        - name: XLA_PYTHON_CLIENT_PREALLOCATE
          value: "false"
        - name: HWLOC_HIDE_ERRORS
          value: "2"
      resources:
        requests:
          cpu: "2"
          memory: 8Gi
        limits:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: workspace
          mountPath: /workspace
  volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: yjiao-rl-chunk-pusht-pvc
